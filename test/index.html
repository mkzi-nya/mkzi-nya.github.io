<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <title>心理量表评估</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --panel: rgba(255,255,255,.82);
      --panel-strong: #ffffff;
      --text: #182033;
      --muted: #647084;
      --line: rgba(30,41,59,.12);
      --brand: #4f7cff;
      --brand-2: #7c4dff;
      --ok: #12a150;
      --warn: #d97706;
      --bad: #dc2626;
      --shadow: 0 20px 60px rgba(31,45,75,.12);
      --shadow-soft: 0 10px 30px rgba(31,45,75,.08);
      --radius: 22px;
      --radius-sm: 14px;
      --input: #ffffff;
      --chip: rgba(79,124,255,.11);
      --chip-line: rgba(79,124,255,.22);
      --overlay: rgba(8, 15, 35, .45);
    }
    html[data-theme="dark"] {
      --bg: #090d16;
      --panel: rgba(19,25,40,.78);
      --panel-strong: #131928;
      --text: #eef3ff;
      --muted: #9aa7bd;
      --line: rgba(226,232,240,.12);
      --brand: #82a5ff;
      --brand-2: #b08cff;
      --ok: #40d37d;
      --warn: #f6b445;
      --bad: #ff6b6b;
      --shadow: 0 20px 70px rgba(0,0,0,.45);
      --shadow-soft: 0 10px 30px rgba(0,0,0,.28);
      --input: rgba(255,255,255,.06);
      --chip: rgba(130,165,255,.13);
      --chip-line: rgba(130,165,255,.25);
      --overlay: rgba(0,0,0,.62);
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(79,124,255,.25), transparent 36vw),
        radial-gradient(circle at 80% 8%, rgba(124,77,255,.20), transparent 34vw),
        radial-gradient(circle at 60% 90%, rgba(20,184,166,.14), transparent 28vw),
        var(--bg);
    }
    a { color: inherit; }
    button, input, select { font: inherit; }
    button { cursor: pointer; }
    .app-shell { width: min(1180px, calc(100% - 32px)); margin: 0 auto; padding: 26px 0 56px; }
    .topbar { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 22px; }
    .brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .logo { width: 42px; height: 42px; border-radius: 14px; background: linear-gradient(135deg, var(--brand), var(--brand-2)); box-shadow: var(--shadow-soft); display: grid; place-items: center; color: white; font-weight: 900; letter-spacing: -.04em; }
    .brand-title { font-weight: 850; font-size: 1.12rem; letter-spacing: -.02em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .brand-sub { color: var(--muted); font-size: .86rem; margin-top: 2px; }
    .top-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
    .icon-btn, .btn { border: 1px solid var(--line); color: var(--text); background: var(--panel); box-shadow: var(--shadow-soft); border-radius: 999px; padding: 10px 14px; transition: transform .15s ease, border-color .15s ease, background .15s ease; }
    .icon-btn:hover, .btn:hover { transform: translateY(-1px); border-color: var(--chip-line); }
    .btn.primary { background: linear-gradient(135deg, var(--brand), var(--brand-2)); border-color: transparent; color: #fff; box-shadow: 0 14px 34px rgba(79,124,255,.25); }
    .btn.ghost { background: transparent; box-shadow: none; }
    .btn.danger { color: var(--bad); }
    .btn.small { padding: 8px 11px; font-size: .9rem; }
    .hero { position: relative; overflow: hidden; border: 1px solid var(--line); background: var(--panel); border-radius: calc(var(--radius) + 8px); padding: clamp(22px, 4vw, 46px); box-shadow: var(--shadow); backdrop-filter: blur(18px); margin-bottom: 22px; }
    .hero::after { content: ""; position: absolute; inset: auto -80px -120px auto; width: 280px; height: 280px; background: linear-gradient(135deg, rgba(79,124,255,.35), rgba(124,77,255,.20)); border-radius: 50%; filter: blur(3px); pointer-events: none; }
    .hero h1 { position: relative; margin: 0 0 12px; font-size: clamp(2rem, 5vw, 4rem); letter-spacing: -.065em; line-height: .98; max-width: 850px; }
    .hero p { position: relative; margin: 0; color: var(--muted); font-size: 1.05rem; max-width: 760px; line-height: 1.75; }
    .chips { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px; position: relative; }
    .chip { border: 1px solid var(--chip-line); background: var(--chip); color: var(--text); border-radius: 999px; padding: 8px 11px; font-size: .88rem; }
    .quiz-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 16px; }
    .quiz-card { border: 1px solid var(--line); background: var(--panel); border-radius: var(--radius); padding: 18px; min-height: 224px; box-shadow: var(--shadow-soft); display: flex; flex-direction: column; gap: 12px; transition: transform .18s ease, border-color .18s ease, background .18s ease; backdrop-filter: blur(16px); }
    .quiz-card:hover { transform: translateY(-3px); border-color: var(--chip-line); background: var(--panel-strong); }
    .quiz-card h2 { margin: 0; font-size: 1.05rem; line-height: 1.45; letter-spacing: -.02em; }
    .quiz-card p { margin: 0; color: var(--muted); line-height: 1.62; font-size: .93rem; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
    .quiz-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-top: auto; color: var(--muted); }
    .meta-pill { border: 1px solid var(--line); background: var(--input); border-radius: 999px; padding: 6px 9px; font-size: .78rem; }
    .card-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 3px; }
    .notice { border: 1px solid var(--chip-line); background: var(--chip); border-radius: var(--radius-sm); padding: 14px 16px; color: var(--muted); line-height: 1.65; margin: 14px 0; }
    .screen { border: 1px solid var(--line); background: var(--panel); border-radius: calc(var(--radius) + 4px); padding: clamp(16px, 3vw, 28px); box-shadow: var(--shadow); backdrop-filter: blur(18px); }
    .screen-head { display: grid; gap: 14px; grid-template-columns: minmax(0, 1fr) auto; align-items: start; margin-bottom: 18px; }
    .screen h1 { margin: 0 0 8px; font-size: clamp(1.45rem, 3.5vw, 2.3rem); letter-spacing: -.045em; line-height: 1.12; }
    .screen .desc, .muted { color: var(--muted); line-height: 1.7; }
    .sticky-tools { position: sticky; top: 0; z-index: 8; margin: 0 -8px 18px; padding: 8px; background: linear-gradient(to bottom, var(--bg), rgba(0,0,0,0)); backdrop-filter: blur(8px); }
    .progress-card { border: 1px solid var(--line); background: var(--panel-strong); border-radius: var(--radius); padding: 12px; box-shadow: var(--shadow-soft); display: grid; gap: 10px; }
    .progress-row { display: flex; justify-content: space-between; gap: 12px; align-items: center; color: var(--muted); font-size: .92rem; }
    .bar { height: 10px; border-radius: 999px; background: rgba(128,128,128,.15); overflow: hidden; }
    .bar > span { display: block; height: 100%; width: 0; border-radius: inherit; background: linear-gradient(90deg, var(--brand), var(--brand-2)); transition: width .2s ease; }
    .form-tools { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .question-list { display: grid; gap: 14px; }
    .question { border: 1px solid var(--line); background: var(--panel-strong); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow-soft); scroll-margin-top: 110px; }
    .question.answered { border-color: rgba(18,161,80,.26); }
    .q-head { display: flex; gap: 12px; align-items: flex-start; margin-bottom: 14px; }
    .q-num { flex: 0 0 auto; min-width: 38px; height: 30px; border-radius: 999px; background: var(--chip); color: var(--brand); display: grid; place-items: center; font-weight: 800; font-size: .9rem; }
    .q-text { line-height: 1.65; font-weight: 650; }
    .options { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 9px; }
    .option { position: relative; display: flex; align-items: center; gap: 10px; padding: 11px 12px; border-radius: 14px; border: 1px solid var(--line); background: var(--input); min-height: 46px; transition: border-color .15s ease, background .15s ease, transform .15s ease; }
    .option:hover { border-color: var(--chip-line); transform: translateY(-1px); }
    .option input { width: 18px; height: 18px; accent-color: var(--brand); flex: 0 0 auto; }
    .option:has(input:checked) { border-color: var(--brand); background: var(--chip); }
    .special-block { display: grid; gap: 10px; }
    .subq { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 12px; align-items: center; border: 1px solid var(--line); background: var(--input); border-radius: 14px; padding: 11px 12px; }
    .subq-actions { display: flex; gap: 8px; }
    .subq-actions label { white-space: nowrap; }
    .select-line { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    select { border: 1px solid var(--line); background: var(--input); color: var(--text); border-radius: 999px; padding: 9px 12px; }
    .form-footer { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 22px; padding-top: 18px; border-top: 1px solid var(--line); }
    .result-grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 14px; margin: 16px 0; }
    .stat { border: 1px solid var(--line); background: var(--panel-strong); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow-soft); }
    .stat .label { color: var(--muted); font-size: .88rem; margin-bottom: 8px; }
    .stat .value { font-size: 2rem; font-weight: 900; letter-spacing: -.04em; }
    .section-title { margin: 24px 0 12px; font-size: 1.1rem; letter-spacing: -.02em; }
    .table-wrap { overflow-x: auto; border: 1px solid var(--line); border-radius: var(--radius); background: var(--panel-strong); }
    table { border-collapse: collapse; width: 100%; min-width: 640px; }
    th, td { padding: 12px 13px; border-bottom: 1px solid var(--line); text-align: left; vertical-align: top; }
    th { color: var(--muted); font-size: .86rem; background: rgba(128,128,128,.05); }
    tr:last-child td { border-bottom: 0; }
    .badge { display: inline-flex; align-items: center; border-radius: 999px; padding: 5px 9px; border: 1px solid var(--line); background: var(--input); font-size: .82rem; white-space: nowrap; }
    .badge.ok { color: var(--ok); border-color: rgba(18,161,80,.25); background: rgba(18,161,80,.08); }
    .badge.warn { color: var(--warn); border-color: rgba(217,119,6,.25); background: rgba(217,119,6,.08); }
    .badge.bad { color: var(--bad); border-color: rgba(220,38,38,.25); background: rgba(220,38,38,.08); }
    .conclusion { border: 1px solid var(--chip-line); background: var(--chip); border-radius: var(--radius); padding: 18px; margin: 16px 0; line-height: 1.75; }
    .conclusion h2 { margin: 0 0 8px; font-size: 1.2rem; }
    .suggestions { margin: 10px 0 0; padding-left: 20px; color: var(--muted); }
    .modal-backdrop { position: fixed; inset: 0; background: var(--overlay); z-index: 50; display: none; place-items: center; padding: 18px; }
    .modal-backdrop.show { display: grid; }
    .modal { width: min(520px, 100%); border: 1px solid var(--line); background: var(--panel-strong); border-radius: calc(var(--radius) + 4px); box-shadow: var(--shadow); padding: 22px; }
    .modal h2 { margin: 0 0 8px; font-size: 1.25rem; }
    .modal p { color: var(--muted); line-height: 1.7; margin: 0 0 16px; }
    .modal-actions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
    .empty { text-align: center; padding: 52px 20px; color: var(--muted); }
    .hidden { display: none !important; }
    @media (max-width: 920px) { .quiz-grid, .result-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } .screen-head { grid-template-columns: 1fr; } }
    @media (max-width: 640px) {
      .app-shell { width: min(100% - 20px, 1180px); padding-top: 14px; }
      .topbar { align-items: flex-start; }
      .brand-sub { display: none; }
      .quiz-grid, .result-grid { grid-template-columns: 1fr; }
      .hero { padding: 22px; }
      .options { grid-template-columns: 1fr; }
      .subq { grid-template-columns: 1fr; }
      .form-footer .btn, .card-actions .btn { width: 100%; justify-content: center; }
      .top-actions { gap: 8px; }
      .btn { padding: 10px 12px; }
      .screen { padding: 14px; border-radius: 20px; }
      .question { padding: 14px; }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand" role="button" tabindex="0" id="brandHome" aria-label="返回主页">
        <div class="logo">Ψ</div>
        <div>
          <div class="brand-title">心理量表评估</div>
        </div>
      </div>
      <div class="top-actions">
        <button class="icon-btn" id="themeToggle" type="button">切换主题</button>
      </div>
    </header>
    <main id="app" aria-live="polite"></main>
  </div>
  <div class="modal-backdrop" id="modalRoot"></div>
  <script src="js/data-bundle.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
